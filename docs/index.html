<!DOCTYPE html><html lang=en><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>To Do List</title><link rel=stylesheet href=todo-api-mock.1f2a1ed7.css><body>

  <main class=todo>
    <div class=todo__container>
      <header class=todo__header>
        <h1 class=todo__title>To Do List</h1>
        <p class=todo__subtitle>Додавай задачі, відмічай виконані та видаляй непотрібні.</p>
      </header>

      <form class="js-todo-form todo__form" autocomplete=off>
        <label class=todo__label for=todo-input>Нова задача</label>

        <div class=todo__controls>
          <input class="js-todo-input todo__input" id=todo-input name=task placeholder="Наприклад: Купити хліб" maxlength=80>
          <button class="js-todo-add todo__add-btn">
            Додати
          </button>
        </div>

        <p class=todo__hint>Підказка: клік по задачі — виконано, хрестик — видалити.</p>
      </form>

      <section class=todo__list-wrap aria-label="Список задач">
        <ul class="js-todo-list todo__list">
        </ul>

        <p class="js-todo-empty todo__empty" hidden>
          Немає задач. Додай першу 👇
        </p>
      </section>
    </div>
  </main>

  <script type=module src=todo-api-mock.0c1fe12d.js></script>
